name: Test Suite

on:
  push:
    branches: [ "main", "r" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: wp-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          libmicrohttpd-dev \
          libpq-dev \
          libjansson-dev \
          libjq-dev \
          liblua5.4-dev \
          libcurl4-openssl-dev \
          postgresql-client \
          libbsd-dev \
          valgrind \
          libargon2-dev \
          r-base \
          r-base-dev
          
    - name: Install R packages
      run: |
        sudo R -e "install.packages(c('jsonlite', 'ggplot2'), repos='https://cloud.r-project.org/')"
        
    - name: Setup R environment for testing
      run: |
        echo "R_LIBS_USER=$HOME/R-libs" >> $GITHUB_ENV
        echo "R_ENVIRON_USER=" >> $GITHUB_ENV
        echo "R_PROFILE_USER=" >> $GITHUB_ENV
        echo "R_HOME=$(R RHOME)" >> $GITHUB_ENV

    - name: Build application
      run: make all

    - name: Install middleware
      run: make install-middleware

    - name: Run static analysis
      run: make test-analyze

    - name: Run linting
      run: make test-lint

    - name: Run unit tests
      run: make test-unit

    - name: Run integration tests
      run: make test-integration
      env:
        WP_PG_HOST: localhost
        WP_PG_USER: postgres
        WP_PG_PASSWORD: postgres
        WP_PG_DATABASE: wp-test

    - name: Run system tests
      run: make test-system
      env:
        WP_PG_HOST: localhost
        WP_PG_USER: postgres
        WP_PG_PASSWORD: postgres
        WP_PG_DATABASE: wp-test

    - name: Run unit leak detection
      run: make test-leaks-unit
      env:
        WP_PG_HOST: localhost
        WP_PG_USER: postgres
        WP_PG_PASSWORD: postgres
        WP_PG_DATABASE: wp-test

    - name: Run integration leak detection
      run: make test-leaks-integration
      env:
        WP_PG_HOST: localhost
        WP_PG_USER: postgres
        WP_PG_PASSWORD: postgres
        WP_PG_DATABASE: wp-test

    - name: Run system leak detection
      run: make test-leaks-system
      env:
        WP_PG_HOST: localhost
        WP_PG_USER: postgres
        WP_PG_PASSWORD: postgres
        WP_PG_DATABASE: wp-test

  test-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install \
          llvm \
          postgresql@14 \
          libmicrohttpd \
          jansson \
          jq \
          lua \
          argon2

    - name: Start PostgreSQL
      run: |
        brew services start postgresql@14
        sleep 5
        /opt/homebrew/opt/postgresql@14/bin/createuser -s postgres || true
        /opt/homebrew/opt/postgresql@14/bin/createdb wp-test -U postgres || true

    - name: Install R packages
      run: |
        brew install r
        R -e "install.packages(c('jsonlite', 'ggplot2'), repos='https://cloud.r-project.org/')"
        
    - name: Setup R environment for testing
      run: |
        echo "R_LIBS_USER=$HOME/R-libs" >> $GITHUB_ENV
        echo "R_ENVIRON_USER=" >> $GITHUB_ENV
        echo "R_PROFILE_USER=" >> $GITHUB_ENV
        echo "R_HOME=$(R RHOME)" >> $GITHUB_ENV

    - name: Build application
      run: make all

    - name: Install middleware
      run: make install-middleware

    - name: Run static analysis
      run: make test-analyze

    - name: Run linting
      run: make test-lint

    - name: Run unit tests
      run: make test-unit

    - name: Run integration tests
      run: make test-integration
      env:
        WP_PG_HOST: localhost
        WP_PG_USER: postgres
        WP_PG_DATABASE: wp-test

    - name: Run system tests
      run: make test-system
      env:
        WP_PG_HOST: localhost
        WP_PG_USER: postgres
        WP_PG_DATABASE: wp-test

    - name: Run unit leak detection
      run: make test-leaks-unit
      env:
        WP_PG_HOST: localhost
        WP_PG_USER: postgres
        WP_PG_DATABASE: wp-test

    - name: Run integration leak detection
      run: make test-leaks-integration
      env:
        WP_PG_HOST: localhost
        WP_PG_USER: postgres
        WP_PG_DATABASE: wp-test

    - name: Run system leak detection
      run: make test-leaks-system
      env:
        WP_PG_HOST: localhost
        WP_PG_USER: postgres
        WP_PG_DATABASE: wp-test

    - name: Stop PostgreSQL
      if: always()
      run: brew services stop postgresql@14