name: Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: wp-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          libmicrohttpd-dev \
          libpq-dev \
          libjansson-dev \
          libjq-dev \
          liblua5.4-dev \
          postgresql-client \
          valgrind

    - name: Build application
      run: make all

    - name: Install middleware
      run: make install-middleware

    - name: Run static analysis
      run: make test-analyze

    - name: Run linting
      run: make test-lint

    - name: Run unit tests
      run: make test-unit

    - name: Run integration tests
      run: make test-integration
      env:
        PGHOST: localhost
        PGUSER: postgres
        PGPASSWORD: postgres
        PGDATABASE: wp-test

    - name: Run system tests
      run: make test-system
      env:
        PGHOST: localhost
        PGUSER: postgres
        PGPASSWORD: postgres
        PGDATABASE: wp-test

    - name: Run leak detection
      run: make test-leaks
      env:
        PGHOST: localhost
        PGUSER: postgres
        PGPASSWORD: postgres
        PGDATABASE: wp-test

  test-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install \
          llvm \
          postgresql@14 \
          libmicrohttpd \
          jansson \
          jq \
          lua

    - name: Start PostgreSQL
      run: |
        brew services start postgresql@14
        sleep 5
        /opt/homebrew/opt/postgresql@14/bin/createuser -s postgres || true
        /opt/homebrew/opt/postgresql@14/bin/createdb wp-test -U postgres || true

    - name: Build application
      run: make all

    - name: Install middleware
      run: make install-middleware

    - name: Run static analysis
      run: make test-analyze

    - name: Run linting
      run: make test-lint

    - name: Run unit tests
      run: make test-unit

    - name: Run integration tests
      run: make test-integration
      env:
        PGHOST: localhost
        PGUSER: postgres
        PGDATABASE: wp-test

    - name: Run system tests
      run: make test-system
      env:
        PGHOST: localhost
        PGUSER: postgres
        PGDATABASE: wp-test

    - name: Run leak detection
      run: make test-leaks
      env:
        PGHOST: localhost
        PGUSER: postgres
        PGDATABASE: wp-test

    - name: Stop PostgreSQL
      if: always()
      run: brew services stop postgresql@14